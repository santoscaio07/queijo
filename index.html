<script>
  const botoes = document.querySelectorAll("button");
  
  
  botoes.forEach( function(botoes){
    let curtiu = false;
    botoes.addEventListener("click", botoesClicado);
  function botoesClicado(){
   console.log("fui clicado");
   let texto = botoes.querySelector("span");
   if (curtiu === false){
    texto.textContent++;
    curtiu = true; 
  }
   else{
     texto.textContent--;
     curtiu = false;
    }
  }
})

</script>
