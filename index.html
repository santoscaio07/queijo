

<!DOCTYPE html>
<html lang="pt-br">
    <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>queijo.com</title>
     <style>
      header{
        background-color: yellow;
       text-align: center;
       max-width: 800px;
      margin: 0 auto;
      padding: 12px;
      border: 5px solid #262401;  
    }
      main{
        background-color: #ffffff;
        color:#262401;
        max-width: 800px;
        margin: 0 auto;
        padding: 16px;
        display: flex;
      }
      img{
       width: 350px;
        height: 200px;

        font-weight: bold;
      }
     </style>
    </head>
    <body>
     
        <header>
          <h1>um site sobre contagem de queijo</h1>
          <p>até onde você chega contando queijo</p>   
        </header>
        <main>   
          <img src="queijov1.png" alt="queijo mal fomado feito por ia">
          <div>
           <h2>no meu primeiro site</h2>

           <button>🧀 <span>0</span></button>
           <button>🍴 <span>0</span></button>
          </div>
          
        </main>

<script>
  const botão = document.querySelector("button");
  botão.addEventListener("click", botãoClicado);
 function botãoClicado(){
   console.log("fui clicado");
   let texto = botão.querySelector("span");
   texto.textContent++;
 }
</script>
